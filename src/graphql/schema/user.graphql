type User {
  password: String!
  id: ID!
  email: String!
  name: String!
  nickName: String
  friends: [User!]!
  avatar: String!
  status: String!
  sentMessages: [Message!]!
  receivedMessages: [Message!]!
  sentFriendRequests: [FriendRequest!]!
  receivedFriendRequests: [FriendRequest!]!
  isFriend: Boolean
}

type Query {
  users: [User!]!
  searchUsers(query: String!): [User!]!
  me: User!
}

type Mutation {
  createUser(
    email: String!,
    name: String!,
    password: String!,
    nickName: String
  ): User!
}