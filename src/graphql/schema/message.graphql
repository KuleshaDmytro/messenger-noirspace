scalar DateTime

type Message {
  id: ID!
  text: String!
  createdAt: DateTime!
  sender: User!
  senderId: ID!
  conversationId: ID!
}

type MessagesFeed {
  items: [Message!]!
  nextCursor: ID
  hasMore: Boolean!
}

extend type Query {
  messages(conversationId: ID!, cursor: ID, take: Int): MessagesFeed!
}

extend type Mutation {
  sendMessage(conversationId: ID!, text: String!): Message!
}